seed: 42
data_root: data/brisc2025
output_dir: outputs/convnext_base_mtl

model:
  backbone: convnext_base.fb_in22k_ft_in1k
  pretrained: true
  num_classes: 4
  in_channels: 1

data:
  image_size: 256
  val_fraction: 0.15
  num_workers: 4
  class_names:
    - no_tumor
    - glioma
    - meningioma
    - pituitary

train:
  epochs: 40
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.00001
  amp: true
  cls_loss_weight: 1.0
  seg_loss_weight: 1.0

eval:
  batch_size: 16
